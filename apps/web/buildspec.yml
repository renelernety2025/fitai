version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging into ECR...
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_URL
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
  build:
    commands:
      - echo Building Web Docker image...
      - docker build -t $ECR_URL/fitai-web:$IMAGE_TAG -t $ECR_URL/fitai-web:latest --platform linux/amd64 --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL -f apps/web/Dockerfile .
      - docker push $ECR_URL/fitai-web:$IMAGE_TAG
      - docker push $ECR_URL/fitai-web:latest
  post_build:
    commands:
      - echo Deploying to ECS...
      - aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --force-new-deployment
      - echo Build completed on $(date)
