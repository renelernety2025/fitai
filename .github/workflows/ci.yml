name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-typecheck:
    name: Build + Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
        working-directory: apps/api
      - name: Build (shared + api + web via turbo)
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://fitai.bfevents.cz
      - name: Lint (turbo — api tsc, web next lint, shared tsc)
        run: npm run lint
      - name: Typecheck Web
        run: npx tsc --noEmit
        working-directory: apps/web

  checks:
    name: Conventions + Docs + Mobile typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Prisma generate + validate
        run: npx prisma generate && npx prisma validate
        working-directory: apps/api
      - name: Unit tests
        run: npm run test -w @fitai/api
      - name: API conventions
        run: bash scripts/check-api-conventions.sh
      - name: Docs integrity
        run: bash scripts/verify-docs-integrity.sh
      - name: Migration safety (no destructive DDL without review)
        run: bash scripts/check-destructive-migration.sh "origin/${{ github.base_ref }}"
      - name: Schema change requires a migration
        run: |
          if ! git diff --quiet "origin/${{ github.base_ref }}"...HEAD -- apps/api/prisma/schema.prisma; then
            if [ -z "$(git diff --name-only --diff-filter=A "origin/${{ github.base_ref }}"...HEAD -- 'apps/api/prisma/migrations/*/migration.sql')" ]; then
              echo "::error::schema.prisma changed but no migration was added. Run: cd apps/api && npx prisma migrate dev --name <change>"
              exit 1
            fi
          fi
          echo "OK"
      - name: Typecheck Mobile
        run: npx tsc --noEmit
        working-directory: apps/mobile
