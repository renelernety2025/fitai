name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint API
        run: pnpm --filter @fitai/api lint || echo "::warning::API lint skipped"
      - name: Lint Web
        run: pnpm --filter @fitai/web lint || echo "::warning::Web lint skipped"
      - name: Typecheck API
        run: pnpm --filter @fitai/api exec tsc --noEmit || echo "::warning::API typecheck skipped"
      - name: Typecheck Web
        run: pnpm --filter @fitai/web exec tsc --noEmit || echo "::warning::Web typecheck skipped"
