name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# Least-privilege default: only the tag-release job elevates to contents:write.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: "326334468637"
  ECS_CLUSTER: fitai-production
  API_SERVICE: fitai-api-service
  WEB_SERVICE: fitai-web-service

jobs:
  detect-changes:
    name: Detect what changed
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
            web:
              - 'apps/web/**'
              - 'packages/**'
            schema:
              - 'apps/api/prisma/schema.prisma'

  build-api:
    name: Build API (CodeBuild)
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326334468637:role/fitai-github-actions
          aws-region: eu-west-1
      - name: Start fitai-api-build and wait
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name fitai-api-build \
            --region $AWS_REGION \
            --query 'build.id' --output text)
          echo "Build started: $BUILD_ID"
          echo "build_id=$BUILD_ID" >> $GITHUB_ENV
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --region $AWS_REGION --query 'builds[0].buildStatus' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then break; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || \
               [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "TIMED_OUT" ]; then
              echo "::error::Build $BUILD_ID finished with status $STATUS"
              exit 1
            fi
            sleep 15
          done

  build-web:
    name: Build Web (CodeBuild)
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326334468637:role/fitai-github-actions
          aws-region: eu-west-1
      - name: Start fitai-web-build and wait
        run: |
          BUILD_ID=$(aws codebuild start-build \
            --project-name fitai-web-build \
            --region $AWS_REGION \
            --query 'build.id' --output text)
          echo "Build started: $BUILD_ID"
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" \
              --region $AWS_REGION --query 'builds[0].buildStatus' --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then break; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "FAULT" ] || \
               [ "$STATUS" = "STOPPED" ] || [ "$STATUS" = "TIMED_OUT" ]; then
              echo "::error::Build $BUILD_ID finished with status $STATUS"
              exit 1
            fi
            sleep 15
          done

  check-migration-safety:
    name: Scan new migrations for destructive DDL
    needs: detect-changes
    if: needs.detect-changes.outputs.schema == 'true'
    runs-on: ubuntu-latest
    outputs:
      destructive: ${{ steps.scan.outputs.destructive }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: scan
        # Scan the FULL pushed range (github.event.before...HEAD), not just the
        # tip commit — migrate deploy applies every pending migration, so a
        # destructive migration in a non-tip commit must not slip the gate.
        # IGNORE_APPROVED_MARKER: at deploy time the .approved-destructive
        # marker must NOT bypass the production-migrations reviewer (it only
        # unblocks the PR-merge CI gate). Destructive DDL always needs approval.
        env:
          BEFORE_SHA: ${{ github.event.before }}
          IGNORE_APPROVED_MARKER: "1"
        run: |
          BASE="$BEFORE_SHA"
          # New-branch / zero SHA fallback → compare against the tip's parent.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            BASE="HEAD~1"
          fi
          if bash scripts/check-destructive-migration.sh "$BASE"; then
            echo "destructive=false" >> $GITHUB_OUTPUT
          else
            echo "destructive=true" >> $GITHUB_OUTPUT
          fi

  approve-destructive-migration:
    name: Manual approval (destructive migration)
    needs: check-migration-safety
    if: needs.check-migration-safety.outputs.destructive == 'true'
    runs-on: ubuntu-latest
    environment: production-migrations # blocks until a reviewer approves
    steps:
      - run: echo "Destructive migration approved by reviewer."

  migrate:
    name: Run Prisma migrate
    needs: [detect-changes, build-api, check-migration-safety, approve-destructive-migration]
    # Always run after a successful API build. `prisma migrate deploy` is
    # idempotent — no-op (~5s) when _prisma_migrations is current.
    # Prevents the failure mode where a previous commit introduced a schema
    # change but the build failed before migration ran, leaving DB out of
    # sync with the new code. See 2026-04-08 incident (commit 8e0c071 → 4aac844).
    # Gate jobs skip on non-schema deploys; 'skipped' satisfies the condition.
    if: >-
      always() && !cancelled() && needs.build-api.result == 'success' &&
      needs.check-migration-safety.result != 'failure' &&
      (needs.approve-destructive-migration.result == 'success' || needs.approve-destructive-migration.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326334468637:role/fitai-github-actions
          aws-region: eu-west-1
      - name: Pre-migration RDS snapshot (schema changes only)
        if: needs.detect-changes.outputs.schema == 'true'
        run: |
          SNAP_ID="fitai-predeploy-$(echo $GITHUB_SHA | cut -c1-7)-$(date -u +%Y%m%d-%H%M%S)"
          # TODO(user): flip this to hard-fail once the rds-predeploy-snapshots
          # IAM policy is attached to fitai-github-actions (command in
          # docs/RUNBOOK-rollback.md). Until then a failed snapshot only warns —
          # destructive migrations are still blocked by the approval gate.
          if ! aws rds create-db-snapshot \
            --db-instance-identifier fitai-production-postgres \
            --db-snapshot-identifier "$SNAP_ID" \
            --region $AWS_REGION; then
            echo "::warning::Pre-migration snapshot FAILED (IAM grant pending — see docs/RUNBOOK-rollback.md). Proceeding without snapshot."
            exit 0
          fi
          echo "Snapshot marker created: $SNAP_ID (crash-consistent as of initiation; completes in background)"
          # Housekeeping: drop fitai-predeploy-* snapshots older than 14 days.
          CUTOFF=$(date -u -d '14 days ago' +%Y-%m-%dT%H:%M:%S)
          aws rds describe-db-snapshots --snapshot-type manual \
            --db-instance-identifier fitai-production-postgres \
            --region $AWS_REGION \
            --query "DBSnapshots[?starts_with(DBSnapshotIdentifier,'fitai-predeploy-') && SnapshotCreateTime<'$CUTOFF'].DBSnapshotIdentifier" \
            --output text | tr '\t' '\n' | while read -r OLD; do
              [ -n "$OLD" ] && aws rds delete-db-snapshot --db-snapshot-identifier "$OLD" --region $AWS_REGION && echo "Deleted old snapshot: $OLD"
            done || true
      - name: Run fitai-migrate task
        run: |
          # Family name (no pinned revision) -> latest ACTIVE revision, which
          # Terraform registers (modules/compute migrate task def).
          # Network config is borrowed from the live api service so subnet/SG
          # ids never live in this file.
          NETCFG=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $API_SERVICE \
            --region $AWS_REGION \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.{subnets:subnets,securityGroups:securityGroups}' \
            --output json)
          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition fitai-migrate \
            --launch-type FARGATE \
            --region $AWS_REGION \
            --network-configuration "{\"awsvpcConfiguration\":$(echo $NETCFG | jq -c '. + {assignPublicIp:"DISABLED"}')}" \
            --query 'tasks[0].taskArn' --output text)
          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --region $AWS_REGION
          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --region $AWS_REGION \
            --query 'tasks[0].containers[0].exitCode' --output text)
          echo "Migration exit code: $EXIT_CODE"
          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed with exit code $EXIT_CODE — tailing logs:"
            TASK_ID=$(basename "$TASK_ARN")
            aws logs get-log-events --log-group-name /ecs/fitai-api \
              --log-stream-name "migrate/migrate/$TASK_ID" --region $AWS_REGION \
              --query 'events[].message' --output text | tail -30 || true
            exit 1
          fi

  deploy-api:
    name: Force ECS redeploy (API)
    needs: [build-api, migrate]
    # This is the ONLY deploy trigger (buildspec post_build no longer deploys —
    # it used to roll new code out BEFORE the migrate task ran).
    # Requires migrate SUCCESS (skipped/failed migrate = no deploy — we never
    # ship code against a stale schema). workflow_dispatch may redeploy the
    # current :latest even when migrate was skipped (no api build).
    if: >-
      always() && !cancelled() &&
      (needs.migrate.result == 'success' ||
       (github.event_name == 'workflow_dispatch' && needs.migrate.result == 'skipped'))
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326334468637:role/fitai-github-actions
          aws-region: eu-west-1
      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $API_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION \
            --query 'service.deployments[0].{Status:status,TaskDef:taskDefinition,Desired:desiredCount}' \
            --output table

  deploy-web:
    name: Force ECS redeploy (Web)
    needs: [build-web]
    if: always() && !cancelled() && (needs.build-web.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326334468637:role/fitai-github-actions
          aws-region: eu-west-1
      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $WEB_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION \
            --query 'service.deployments[0].{Status:status,TaskDef:taskDefinition,Desired:desiredCount}' \
            --output table

  smoke-test:
    name: Smoke test production
    needs: [build-api, build-web, migrate, deploy-api, deploy-web]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::326334468637:role/fitai-github-actions
          aws-region: eu-west-1
      - name: Wait for ECS services to stabilize
        run: |
          echo "Waiting for fitai-api-service to reach steady state..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $API_SERVICE \
            --region $AWS_REGION || echo "::warning::API service wait timed out"
          echo "Waiting for fitai-web-service to reach steady state..."
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $WEB_SERVICE \
            --region $AWS_REGION || echo "::warning::Web service wait timed out"
          echo "Both services stable. Sleeping 15s for ALB target group to register..."
          sleep 15
      - name: Verify rollout completed (circuit breaker did not roll back)
        run: |
          FAILED=0
          for SVC in $API_SERVICE $WEB_SERVICE; do
            STATE=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $SVC \
              --region $AWS_REGION --query 'services[0].deployments[0].rolloutState' --output text)
            echo "$SVC rolloutState=$STATE"
            if [ "$STATE" != "COMPLETED" ]; then
              echo "::error::$SVC deployment did not complete (state=$STATE) — circuit breaker likely rolled back to the previous version"
              FAILED=1
            fi
          done
          exit $FAILED
      - name: Run test-production.sh
        run: |
          if [ -f test-production.sh ]; then
            bash test-production.sh
          else
            echo "::warning::test-production.sh not found — skipping"
          fi

  tag-release:
    name: Tag successful deploy
    needs: [smoke-test]
    if: needs.smoke-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write # only this job needs to push a tag
    steps:
      - uses: actions/checkout@v4
      - name: Create deploy tag
        run: |
          TAG="deploy-$(date -u +%Y%m%d-%H%M%S)-$(echo $GITHUB_SHA | cut -c1-7)"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged: $TAG"

  summary:
    name: Deploy summary
    needs: [detect-changes, build-api, build-web, migrate, deploy-api, deploy-web, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print summary
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- API build: ${{ needs.build-api.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web build: ${{ needs.build-web.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Migration: ${{ needs.migrate.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- API redeploy: ${{ needs.deploy-api.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web redeploy: ${{ needs.deploy-web.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke test: ${{ needs.smoke-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Production: https://fitai.bfevents.cz" >> $GITHUB_STEP_SUMMARY
